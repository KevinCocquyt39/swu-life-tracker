<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
	<meta name="theme-color" content="#020408" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
	<meta name="mobile-web-app-capable" content="yes" />
	<title>SWU Life Tracker</title>
	<link rel="manifest" href="manifest.json" />
	<link rel="apple-touch-icon" href="icon.svg" />
	<link rel="icon" type="image/svg+xml" href="icon.svg" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link rel="stylesheet"
		href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cinzel+Decorative:wght@400;700&display=swap" />
	<style>
		/* ── Global ──────────────────────────────────────────────── */
		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		html,
		body {
			height: 100%;
			overflow: hidden;
			background: #000;
			touch-action: manipulation;
		}

		/* ── Design tokens ───────────────────────────────────────── */
		:root {
			--yellow: #FFE81F;
			--yellow-dim: rgba(255, 232, 31, 0.45);
			--red: #CC0022;
			--red-bright: #FF1744;
			--red-glow: rgba(255, 23, 68, 0.55);
			--blue: #0077DD;
			--blue-bright: #40C4FF;
			--blue-glow: rgba(64, 196, 255, 0.55);
			--bg: #020408;
			--divider-h: 58px;
			--font-hud: 'Orbitron', sans-serif;
			--font-lore: 'Cinzel Decorative', serif;
		}

		/* ── Arena ───────────────────────────────────────────────── */
		.arena {
			position: relative;
			display: flex;
			flex-direction: column;
			width: 100vw;
			height: 100dvh;
			height: 100vh;
			/* fallback */
			height: 100dvh;
			overflow: hidden;
			background: var(--bg);
			font-family: var(--font-hud);
			user-select: none;
			-webkit-user-select: none;
		}

		/* ── Starfield ───────────────────────────────────────────── */
		.starfield {
			position: absolute;
			inset: 0;
			pointer-events: none;
			z-index: 0;
		}

		.star {
			position: absolute;
			background: #fff;
			border-radius: 50%;
			animation: twinkle linear infinite;
		}

		@keyframes twinkle {
			0% {
				opacity: 0.08;
				transform: scale(0.7);
			}

			50% {
				opacity: 0.9;
				transform: scale(1.3);
			}

			100% {
				opacity: 0.08;
				transform: scale(0.7);
			}
		}

		/* ── Scanlines ───────────────────────────────────────────── */
		.scanlines {
			position: absolute;
			inset: 0;
			z-index: 1;
			pointer-events: none;
			background: repeating-linear-gradient(0deg,
					transparent,
					transparent 2px,
					rgba(0, 0, 0, 0.14) 2px,
					rgba(0, 0, 0, 0.14) 4px);
		}

		/* ── Player Panels ───────────────────────────────────────── */
		.player-panel {
			position: relative;
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			z-index: 2;
			overflow: hidden;
			transition: background 0.6s ease;
		}

		.dark-side {
			transform: rotate(180deg);
			background: radial-gradient(ellipse at 50% 85%, rgba(180, 0, 20, 0.18) 0%, transparent 65%), var(--bg);
		}

		.light-side {
			background: radial-gradient(ellipse at 50% 15%, rgba(0, 119, 221, 0.18) 0%, transparent 65%), var(--bg);
		}

		.player-panel.critical.dark-side {
			background: radial-gradient(ellipse at 50% 85%, rgba(220, 0, 30, 0.35) 0%, transparent 65%), var(--bg);
			animation: panel-danger 1.2s ease-in-out infinite;
		}

		.player-panel.critical.light-side {
			background: radial-gradient(ellipse at 50% 15%, rgba(0, 80, 180, 0.35) 0%, transparent 65%), var(--bg);
			animation: panel-danger 1.2s ease-in-out infinite;
		}

		@keyframes panel-danger {

			0%,
			100% {
				filter: brightness(1);
			}

			50% {
				filter: brightness(1.15);
			}
		}

		.player-panel.defeated {
			filter: grayscale(0.4) brightness(0.6);
		}

		/* ── Panel inner ─────────────────────────────────────────── */
		.panel-inner {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: clamp(10px, 2.5vh, 22px);
			padding: clamp(8px, 2vw, 28px);
			width: 100%;
			max-width: 560px;
		}

		/* ── Faction name ────────────────────────────────────────── */
		.faction-name {
			font-family: var(--font-lore);
			font-size: clamp(0.7rem, 2.2vw, 1.25rem);
			letter-spacing: 0.35em;
			display: flex;
			align-items: center;
			gap: 14px;
			text-transform: uppercase;
		}

		.ds-label {
			color: var(--red-bright);
			text-shadow: 0 0 18px var(--red-glow), 0 0 40px rgba(255, 23, 68, 0.25);
		}

		.ls-label {
			color: var(--blue-bright);
			text-shadow: 0 0 18px var(--blue-glow), 0 0 40px rgba(64, 196, 255, 0.25);
		}

		.pip {
			display: inline-block;
			width: 7px;
			height: 7px;
			border-radius: 50%;
			animation: pip-blink 2.4s ease-in-out infinite;
		}

		.ds-label .pip {
			background: var(--red-bright);
			box-shadow: 0 0 8px var(--red-bright);
		}

		.ls-label .pip {
			background: var(--blue-bright);
			box-shadow: 0 0 8px var(--blue-bright);
		}

		@keyframes pip-blink {

			0%,
			100% {
				opacity: 0.4;
				transform: scale(0.75);
			}

			50% {
				opacity: 1;
				transform: scale(1.25);
			}
		}

		/* ── Counter row ─────────────────────────────────────────── */
		.counter-row {
			display: flex;
			align-items: center;
			gap: clamp(14px, 4.5vw, 44px);
		}

		/* ── Counter buttons ─────────────────────────────────────── */
		.btn-counter {
			width: clamp(60px, 17vw, 92px);
			height: clamp(60px, 17vw, 92px);
			border-radius: 50%;
			border: 2px solid;
			background: transparent;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: transform 0.1s ease, box-shadow 0.15s ease, background 0.15s ease;
			-webkit-tap-highlight-color: transparent;
			touch-action: manipulation;
		}

		.dark-side .btn-counter {
			border-color: rgba(255, 23, 68, 0.45);
			color: var(--red-bright);
		}

		.dark-side .btn-counter:hover,
		.dark-side .btn-counter:active {
			background: rgba(255, 23, 68, 0.15);
			border-color: var(--red-bright);
			box-shadow: 0 0 22px var(--red-glow), inset 0 0 16px rgba(255, 23, 68, 0.1);
			transform: scale(1.1);
		}

		.light-side .btn-counter {
			border-color: rgba(64, 196, 255, 0.45);
			color: var(--blue-bright);
		}

		.light-side .btn-counter:hover,
		.light-side .btn-counter:active {
			background: rgba(64, 196, 255, 0.15);
			border-color: var(--blue-bright);
			box-shadow: 0 0 22px var(--blue-glow), inset 0 0 16px rgba(64, 196, 255, 0.1);
			transform: scale(1.1);
		}

		.btn-icon {
			font-size: clamp(1.8rem, 5.5vw, 2.8rem);
			font-weight: 700;
			line-height: 1;
		}

		/* ── HP display ──────────────────────────────────────────── */
		.hp-wrap {
			display: flex;
			flex-direction: column;
			align-items: center;
			min-width: clamp(90px, 22vw, 160px);
		}

		.hp-num {
			font-size: clamp(6rem, 24vw, 12rem);
			font-weight: 900;
			line-height: 1;
			color: var(--yellow);
			text-shadow: 0 0 24px rgba(255, 232, 31, 0.6), 0 0 60px rgba(255, 232, 31, 0.2);
			transition: color 0.2s ease;
		}

		.hp-num.flash {
			animation: hp-flash 0.38s cubic-bezier(.36, .07, .19, .97);
		}

		@keyframes hp-flash {
			0% {
				transform: scale(1);
				color: var(--yellow);
			}

			30% {
				transform: scale(1.22);
				color: #fff;
			}

			100% {
				transform: scale(1);
				color: var(--yellow);
			}
		}

		.critical .hp-num {
			animation: crit-pulse 0.9s ease-in-out infinite;
		}

		@keyframes crit-pulse {

			0%,
			100% {
				text-shadow: 0 0 24px rgba(255, 232, 31, 0.6);
			}

			50% {
				text-shadow: 0 0 60px #fff, 0 0 100px rgba(255, 232, 31, 0.5);
			}
		}

		.base-label {
			font-size: clamp(0.42rem, 1.3vw, 0.65rem);
			letter-spacing: 0.45em;
			color: var(--yellow-dim);
			margin-top: 4px;
		}

		/* ── Centre divider bar ──────────────────────────────────── */
		.divider-bar {
			position: relative;
			z-index: 10;
			height: var(--divider-h);
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 10px;
			background: rgba(0, 0, 0, 0.75);
			border-top: 1px solid rgba(255, 255, 255, 0.06);
			border-bottom: 1px solid rgba(255, 255, 255, 0.06);
			flex-shrink: 0;
		}

		.saber-track {
			flex: 1;
			height: 3px;
			border-radius: 2px;
		}

		.saber-red {
			background: linear-gradient(to left, var(--red-bright), transparent);
			box-shadow: 0 0 10px var(--red-bright), 0 0 22px var(--red-glow);
			animation: saber-breathe 2s ease-in-out infinite;
		}

		.saber-blue {
			background: linear-gradient(to right, var(--blue-bright), transparent);
			box-shadow: 0 0 10px var(--blue-bright), 0 0 22px var(--blue-glow);
			animation: saber-breathe 2s ease-in-out infinite 1s;
		}

		@keyframes saber-breathe {

			0%,
			100% {
				opacity: 0.65;
			}

			50% {
				opacity: 1;
			}
		}

		/* ── Settings button ─────────────────────────────────────── */
		.settings-btn {
			width: 38px;
			height: 38px;
			flex-shrink: 0;
			border-radius: 50%;
			background: transparent;
			border: 1px solid rgba(255, 232, 31, 0.2);
			color: rgba(255, 232, 31, 0.45);
			font-size: 1rem;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: all 0.18s ease;
			margin-right: 6px;
			-webkit-tap-highlight-color: transparent;
			touch-action: manipulation;
		}

		.settings-btn:hover,
		.settings-btn:active {
			border-color: var(--yellow);
			color: var(--yellow);
			box-shadow: 0 0 16px rgba(255, 232, 31, 0.3);
			transform: rotate(60deg) scale(1.1);
		}

		/* ── Reset orb ───────────────────────────────────────────── */
		.reset-orb {
			width: 46px;
			height: 46px;
			flex-shrink: 0;
			border-radius: 50%;
			background: rgba(10, 12, 20, 0.92);
			border: 2px solid rgba(255, 232, 31, 0.28);
			color: rgba(255, 232, 31, 0.65);
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: all 0.18s ease;
			-webkit-tap-highlight-color: transparent;
			touch-action: manipulation;
		}

		.reset-orb:hover,
		.reset-orb:active {
			border-color: var(--yellow);
			color: var(--yellow);
			box-shadow: 0 0 20px rgba(255, 232, 31, 0.4);
			transform: scale(1.12) rotate(20deg);
		}

		.reset-icon {
			font-size: 1.25rem;
		}

		/* ── Victory overlay ─────────────────────────────────────── */
		.victory-overlay {
			position: absolute;
			inset: 0;
			z-index: 100;
			display: flex;
			align-items: center;
			justify-content: center;
			background: rgba(0, 0, 0, 0.88);
			backdrop-filter: blur(6px);
			cursor: pointer;
		}

		.victory-content {
			text-align: center;
			display: flex;
			flex-direction: column;
			align-items: center;
		}

		.victory-crawl {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: clamp(10px, 2.5vh, 20px);
			animation: crawl-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
		}

		@keyframes crawl-in {
			from {
				opacity: 0;
				transform: translateY(40px) scale(0.92);
			}

			to {
				opacity: 1;
				transform: translateY(0) scale(1);
			}
		}

		.victory-faction-name {
			font-family: var(--font-lore);
			font-size: clamp(2.2rem, 9vw, 4.5rem);
			font-weight: 700;
			letter-spacing: 0.08em;
			animation: victory-pulse 1.8s ease-in-out infinite;
		}

		.victory-faction-name.red {
			color: var(--red-bright);
			text-shadow: 0 0 40px var(--red-bright), 0 0 80px var(--red-glow);
		}

		.victory-faction-name.blue {
			color: var(--blue-bright);
			text-shadow: 0 0 40px var(--blue-bright), 0 0 80px var(--blue-glow);
		}

		@keyframes victory-pulse {

			0%,
			100% {
				filter: brightness(1);
			}

			50% {
				filter: brightness(1.5);
			}
		}

		.victory-subtitle {
			font-size: clamp(0.9rem, 2.8vw, 1.6rem);
			letter-spacing: 0.45em;
			color: var(--yellow);
			text-shadow: 0 0 20px rgba(255, 232, 31, 0.5);
		}

		.victory-divider {
			width: 160px;
			height: 1px;
			background: linear-gradient(to right, transparent, var(--yellow-dim), transparent);
			margin: 4px 0;
		}

		.victory-cta {
			font-size: clamp(0.6rem, 1.8vw, 0.85rem);
			letter-spacing: 0.3em;
			color: rgba(255, 255, 255, 0.35);
			animation: blink-cta 1.6s ease-in-out infinite;
		}

		@keyframes blink-cta {

			0%,
			100% {
				opacity: 0.35;
			}

			50% {
				opacity: 0.9;
			}
		}

		/* ── Config modal ────────────────────────────────────────── */
		.config-backdrop {
			position: absolute;
			inset: 0;
			z-index: 200;
			display: flex;
			align-items: center;
			justify-content: center;
			background: rgba(0, 0, 0, 0.9);
			backdrop-filter: blur(8px);
		}

		.config-panel {
			background: rgba(4, 7, 16, 0.98);
			border: 1px solid rgba(255, 232, 31, 0.22);
			box-shadow:
				0 0 0 1px rgba(255, 232, 31, 0.06),
				0 0 60px rgba(0, 0, 0, 0.8),
				0 0 30px rgba(255, 232, 31, 0.06);
			border-radius: 4px;
			padding: clamp(20px, 5vw, 36px);
			width: min(88vw, 460px);
			display: flex;
			flex-direction: column;
			gap: clamp(18px, 3vh, 26px);
		}

		.config-title {
			font-family: var(--font-lore);
			font-size: clamp(0.8rem, 2.5vw, 1.15rem);
			letter-spacing: 0.35em;
			color: var(--yellow);
			text-shadow: 0 0 20px rgba(255, 232, 31, 0.4);
			text-align: center;
		}

		.config-body {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: clamp(12px, 3vw, 24px);
		}

		.config-side {
			display: flex;
			flex-direction: column;
			gap: 10px;
			align-items: center;
		}

		.config-faction-label {
			font-family: var(--font-lore);
			font-size: clamp(0.55rem, 1.6vw, 0.78rem);
			letter-spacing: 0.3em;
		}

		.config-presets {
			display: flex;
			gap: 5px;
			flex-wrap: wrap;
			justify-content: center;
		}

		.preset-btn {
			width: 44px;
			height: 32px;
			border-radius: 3px;
			font-family: var(--font-hud);
			font-size: 0.72rem;
			font-weight: 700;
			cursor: pointer;
			transition: all 0.14s ease;
			-webkit-tap-highlight-color: transparent;
			touch-action: manipulation;
		}

		.ds-preset {
			background: transparent;
			border: 1px solid rgba(255, 23, 68, 0.3);
			color: rgba(255, 23, 68, 0.65);
		}

		.ds-preset:hover,
		.ds-preset.active {
			background: rgba(255, 23, 68, 0.18);
			border-color: var(--red-bright);
			color: var(--red-bright);
			box-shadow: 0 0 10px var(--red-glow);
		}

		.ls-preset {
			background: transparent;
			border: 1px solid rgba(64, 196, 255, 0.3);
			color: rgba(64, 196, 255, 0.65);
		}

		.ls-preset:hover,
		.ls-preset.active {
			background: rgba(64, 196, 255, 0.18);
			border-color: var(--blue-bright);
			color: var(--blue-bright);
			box-shadow: 0 0 10px var(--blue-glow);
		}

		.hp-input {
			width: 86px;
			height: 46px;
			background: rgba(0, 0, 0, 0.55);
			border-radius: 3px;
			color: var(--yellow);
			font-family: var(--font-hud);
			font-size: 1.5rem;
			font-weight: 700;
			text-align: center;
			outline: none;
			transition: border-color 0.15s ease, box-shadow 0.15s ease;
		}

		.ds-input {
			border: 1px solid rgba(255, 23, 68, 0.3);
		}

		.ds-input:focus {
			border-color: var(--red-bright);
			box-shadow: 0 0 14px var(--red-glow);
		}

		.ls-input {
			border: 1px solid rgba(64, 196, 255, 0.3);
		}

		.ls-input:focus {
			border-color: var(--blue-bright);
			box-shadow: 0 0 14px var(--blue-glow);
		}

		.hp-input::-webkit-inner-spin-button,
		.hp-input::-webkit-outer-spin-button {
			-webkit-appearance: none;
		}

		.hp-input[type='number'] {
			-moz-appearance: textfield;
			appearance: textfield;
		}

		.config-actions {
			display: flex;
			gap: 10px;
			justify-content: center;
		}

		.config-btn {
			height: 40px;
			padding: 0 clamp(16px, 4vw, 28px);
			border-radius: 3px;
			font-family: var(--font-hud);
			font-size: 0.72rem;
			font-weight: 700;
			letter-spacing: 0.18em;
			cursor: pointer;
			transition: all 0.15s ease;
			-webkit-tap-highlight-color: transparent;
			touch-action: manipulation;
		}

		.cancel-btn {
			background: transparent;
			border: 1px solid rgba(255, 255, 255, 0.12);
			color: rgba(255, 255, 255, 0.38);
		}

		.cancel-btn:hover,
		.cancel-btn:active {
			border-color: rgba(255, 255, 255, 0.32);
			color: rgba(255, 255, 255, 0.65);
		}

		.apply-btn {
			background: rgba(255, 232, 31, 0.08);
			border: 1px solid rgba(255, 232, 31, 0.45);
			color: var(--yellow);
		}

		.apply-btn:hover,
		.apply-btn:active {
			background: rgba(255, 232, 31, 0.18);
			border-color: var(--yellow);
			box-shadow: 0 0 22px rgba(255, 232, 31, 0.25);
			color: #fff;
		}

		/* ── Timer display ──────────────────────────────────────── */
		.timer-display {
			font-family: var(--font-hud);
			font-size: clamp(0.78rem, 2.4vw, 1.05rem);
			font-weight: 700;
			letter-spacing: 0.12em;
			color: var(--yellow);
			text-shadow: 0 0 14px rgba(255, 232, 31, 0.55), 0 0 30px rgba(255, 232, 31, 0.2);
			min-width: 96px;
			text-align: center;
			flex-shrink: 0;
			pointer-events: none;
		}

		/* ── Timer button ────────────────────────────────────────── */
		.timer-btn {
			width: 38px;
			height: 38px;
			flex-shrink: 0;
			border-radius: 50%;
			background: transparent;
			border: 1px solid rgba(255, 232, 31, 0.2);
			color: rgba(255, 232, 31, 0.55);
			font-size: 0.9rem;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: all 0.18s ease;
			-webkit-tap-highlight-color: transparent;
			touch-action: manipulation;
		}

		.timer-btn:hover,
		.timer-btn:active {
			border-color: var(--yellow);
			color: var(--yellow);
			box-shadow: 0 0 16px rgba(255, 232, 31, 0.3);
			transform: scale(1.1);
		}

		/* ── Themes ────────────────────────────────────────────────── */
		/* Tatooine – desert sands */
		.arena.tatooine {
			--bg: #1C0D02;
			--yellow: #F5A623;
			--yellow-dim: rgba(245, 166, 35, 0.45);
			background: #1C0D02;
		}

		.arena.tatooine .player-panel.dark-side {
			background: radial-gradient(ellipse at 50% 85%, rgba(180, 60, 0, 0.22) 0%, transparent 65%), #1C0D02;
		}

		.arena.tatooine .player-panel.light-side {
			background: radial-gradient(ellipse at 50% 15%, rgba(200, 140, 20, 0.2) 0%, transparent 65%), #1C0D02;
		}

		.arena.tatooine .player-panel.critical.dark-side {
			background: radial-gradient(ellipse at 50% 85%, rgba(210, 80, 0, 0.38) 0%, transparent 65%), #1C0D02;
		}

		.arena.tatooine .player-panel.critical.light-side {
			background: radial-gradient(ellipse at 50% 15%, rgba(200, 140, 20, 0.38) 0%, transparent 65%), #1C0D02;
		}

		.arena.tatooine .divider-bar {
			background: rgba(28, 13, 2, 0.85);
		}

		.arena.tatooine .star {
			background: #D4882A;
			box-shadow: 0 0 3px rgba(212, 136, 42, 0.6);
			border-radius: 30%;
		}

		.arena.tatooine .saber-blue {
			background: linear-gradient(to right, #E8B030, transparent);
			box-shadow: 0 0 10px #E8B030, 0 0 22px rgba(232, 176, 48, 0.55);
		}

		/* Hoth – ice fields */
		.arena.hoth {
			--bg: #050A10;
			--yellow: #9FD8F0;
			--yellow-dim: rgba(159, 216, 240, 0.45);
			background: #050A10;
		}

		.arena.hoth .player-panel.dark-side {
			background: radial-gradient(ellipse at 50% 85%, rgba(20, 50, 100, 0.28) 0%, transparent 65%), #050A10;
		}

		.arena.hoth .player-panel.light-side {
			background: radial-gradient(ellipse at 50% 15%, rgba(120, 190, 230, 0.16) 0%, transparent 65%), #050A10;
		}

		.arena.hoth .player-panel.critical.dark-side {
			background: radial-gradient(ellipse at 50% 85%, rgba(30, 80, 160, 0.4) 0%, transparent 65%), #050A10;
		}

		.arena.hoth .player-panel.critical.light-side {
			background: radial-gradient(ellipse at 50% 15%, rgba(140, 210, 245, 0.35) 0%, transparent 65%), #050A10;
		}

		.arena.hoth .divider-bar {
			background: rgba(5, 10, 16, 0.88);
		}

		.arena.hoth .star {
			background: #D0E8FF;
			box-shadow: 0 0 5px rgba(200, 230, 255, 0.6);
			border-radius: 10%;
		}

		.arena.hoth .saber-red {
			background: linear-gradient(to left, #88C4E8, transparent);
			box-shadow: 0 0 10px #88C4E8, 0 0 22px rgba(136, 196, 232, 0.55);
		}

		.arena.hoth .saber-blue {
			background: linear-gradient(to right, #A8DCF8, transparent);
			box-shadow: 0 0 10px #A8DCF8, 0 0 22px rgba(168, 220, 248, 0.55);
		}

		/* Endor – forest moon */
		.arena.endor {
			--bg: #020C04;
			--yellow: #7FD93A;
			--yellow-dim: rgba(127, 217, 58, 0.45);
			background: #020C04;
		}

		.arena.endor .player-panel.dark-side {
			background: radial-gradient(ellipse at 50% 85%, rgba(0, 80, 20, 0.28) 0%, transparent 65%), #020C04;
		}

		.arena.endor .player-panel.light-side {
			background: radial-gradient(ellipse at 50% 15%, rgba(40, 160, 60, 0.18) 0%, transparent 65%), #020C04;
		}

		.arena.endor .player-panel.critical.dark-side {
			background: radial-gradient(ellipse at 50% 85%, rgba(0, 110, 30, 0.42) 0%, transparent 65%), #020C04;
		}

		.arena.endor .player-panel.critical.light-side {
			background: radial-gradient(ellipse at 50% 15%, rgba(40, 180, 70, 0.35) 0%, transparent 65%), #020C04;
		}

		.arena.endor .divider-bar {
			background: rgba(2, 12, 4, 0.88);
		}

		.arena.endor .star {
			background: #A0E040;
			box-shadow: 0 0 8px rgba(160, 224, 64, 0.65);
		}

		.arena.endor .saber-red {
			background: linear-gradient(to left, #A0E040, transparent);
			box-shadow: 0 0 10px #A0E040, 0 0 22px rgba(160, 224, 64, 0.55);
		}

		.arena.endor .saber-blue {
			background: linear-gradient(to right, #70CB30, transparent);
			box-shadow: 0 0 10px #70CB30, 0 0 22px rgba(112, 203, 48, 0.55);
		}

		/* ── Theme selector ────────────────────────────────────────── */
		.theme-section {
			display: flex;
			flex-direction: column;
			gap: 10px;
			align-items: center;
		}

		.theme-section .theme-label {
			font-family: var(--font-lore);
			font-size: clamp(0.55rem, 1.6vw, 0.78rem);
			letter-spacing: 0.3em;
			color: rgba(255, 255, 255, 0.5);
		}

		.theme-options {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
			justify-content: center;
		}

		.theme-btn {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 5px;
			width: 72px;
			height: 62px;
			border-radius: 4px;
			background: transparent;
			border: 1px solid rgba(255, 255, 255, 0.1);
			color: rgba(255, 255, 255, 0.35);
			font-family: var(--font-hud);
			cursor: pointer;
			transition: all 0.18s ease;
			-webkit-tap-highlight-color: transparent;
			touch-action: manipulation;
			padding: 8px 4px 6px;
		}

		.theme-icon {
			font-size: 1.4rem;
			line-height: 1;
		}

		.theme-name {
			font-size: 0.48rem;
			letter-spacing: 0.2em;
		}

		.theme-btn--space.active,
		.theme-btn--space:hover {
			border-color: rgba(255, 232, 31, 0.55);
			color: #FFE81F;
			box-shadow: 0 0 12px rgba(255, 232, 31, 0.2);
			background: rgba(255, 232, 31, 0.06);
		}

		.theme-btn--tatooine.active,
		.theme-btn--tatooine:hover {
			border-color: rgba(245, 166, 35, 0.55);
			color: #F5A623;
			box-shadow: 0 0 12px rgba(245, 166, 35, 0.2);
			background: rgba(245, 166, 35, 0.06);
		}

		.theme-btn--hoth.active,
		.theme-btn--hoth:hover {
			border-color: rgba(159, 216, 240, 0.55);
			color: #9FD8F0;
			box-shadow: 0 0 12px rgba(159, 216, 240, 0.2);
			background: rgba(159, 216, 240, 0.06);
		}

		.theme-btn--endor.active,
		.theme-btn--endor:hover {
			border-color: rgba(127, 217, 58, 0.55);
			color: #7FD93A;
			box-shadow: 0 0 12px rgba(127, 217, 58, 0.2);
			background: rgba(127, 217, 58, 0.06);
		}

		/* ── Transitions ─────────────────────────────────────────── */
		.victory-enter-active,
		.victory-leave-active {
			transition: opacity 0.4s ease;
		}

		.victory-enter-from,
		.victory-leave-to {
			opacity: 0;
		}

		.modal-enter-active {
			transition: opacity 0.22s ease;
		}

		.modal-leave-active {
			transition: opacity 0.18s ease;
		}

		.modal-enter-from,
		.modal-leave-to {
			opacity: 0;
		}
	</style>
</head>

<body>
	<div id="app">
		<div class="arena" :class="theme">
			<!-- CSS Starfield -->
			<div class="starfield" aria-hidden="true">
				<div v-for="i in 130" :key="i" class="star" :style="{
            left: ((i * 137.508) % 100) + '%',
            top:  ((i * 73.611)  % 100) + '%',
            width:  (0.5 + (i % 3) * 0.8) + 'px',
            height: (0.5 + (i % 3) * 0.8) + 'px',
            animationDelay:    ((i * 0.317) % 5) + 's',
            animationDuration: (1.8 + (i % 7) * 0.6) + 's',
          }"></div>
			</div>

			<!-- Scanline overlay -->
			<div class="scanlines" aria-hidden="true"></div>

			<!-- PLAYER 1 – DARK SIDE (rotated 180°) -->
			<section class="player-panel dark-side" :class="stateClass(p1hp, startHp1)">
				<div class="panel-inner">
					<div class="faction-name ds-label">
						<span class="pip"></span>
						DARK SIDE
						<span class="pip"></span>
					</div>
					<div class="counter-row">
						<button class="btn-counter" @click="change(1, -1)" @contextmenu.prevent="change(1, -5)"
							aria-label="Decrease Dark Side damage">
							<span class="btn-icon">&#x2212;</span>
						</button>
						<div class="hp-wrap">
							<span class="hp-num" :class="{ flash: p1Flash }">{{ p1hp }}</span>
							<div class="base-label">DAMAGE / {{ startHp1 }}</div>
						</div>
						<button class="btn-counter" @click="change(1, 1)" @contextmenu.prevent="change(1, 5)"
							aria-label="Increase Dark Side damage">
							<span class="btn-icon">+</span>
						</button>
					</div>
				</div>
			</section>

			<!-- CENTER DIVIDER -->
			<div class="divider-bar">
				<div class="saber-track saber-red"></div>
				<button class="settings-btn" @click="openConfig" aria-label="Configure game"
					title="Configure">&#9881;</button>
				<button class="timer-btn" @click="toggleTimer"
					:aria-label="timerRunning ? 'Pause timer' : 'Start timer'"
					:title="timerRunning ? 'Pause' : 'Start'">
					<span>{{ timerRunning ? '⏸' : '▶' }}</span>
				</button>
				<span class="timer-display" aria-live="off" aria-label="Game timer">{{ timerFormatted }}</span>
				<button class="reset-orb" @click="reset" aria-label="Reset game" title="Reset game">
					<span class="reset-icon">&#x21ba;</span>
				</button>
				<div class="saber-track saber-blue"></div>
			</div>

			<!-- PLAYER 2 – LIGHT SIDE (normal) -->
			<section class="player-panel light-side" :class="stateClass(p2hp, startHp2)">
				<div class="panel-inner">
					<div class="faction-name ls-label">
						<span class="pip"></span>
						LIGHT SIDE
						<span class="pip"></span>
					</div>
					<div class="counter-row">
						<button class="btn-counter" @click="change(2, -1)" @contextmenu.prevent="change(2, -5)"
							aria-label="Decrease Light Side damage">
							<span class="btn-icon">&#x2212;</span>
						</button>
						<div class="hp-wrap">
							<span class="hp-num" :class="{ flash: p2Flash }">{{ p2hp }}</span>
							<div class="base-label">DAMAGE / {{ startHp2 }}</div>
						</div>
						<button class="btn-counter" @click="change(2, 1)" @contextmenu.prevent="change(2, 5)"
							aria-label="Increase Light Side damage">
							<span class="btn-icon">+</span>
						</button>
					</div>
				</div>
			</section>

			<!-- CONFIG MODAL -->
			<Transition name="modal">
				<div v-if="showConfig" class="config-backdrop" @click.self="closeConfig">
					<div class="config-panel" role="dialog" aria-label="Configure Battle">
						<div class="config-title">CONFIGURE BATTLE</div>
						<div class="config-body">
							<!-- Dark Side -->
							<div class="config-side">
								<div class="config-faction-label ds-label">DARK SIDE</div>
								<div class="config-presets">
									<button v-for="p in PRESETS" :key="p" class="preset-btn ds-preset"
										:class="{ active: draftHp1 === p }" @click="draftHp1 = p">{{ p }}</button>
								</div>
								<input type="number" class="hp-input ds-input" v-model.number="draftHp1" min="1"
									max="99" aria-label="Dark Side base HP" />
							</div>
							<!-- Light Side -->
							<div class="config-side">
								<div class="config-faction-label ls-label">LIGHT SIDE</div>
								<div class="config-presets">
									<button v-for="p in PRESETS" :key="p" class="preset-btn ls-preset"
										:class="{ active: draftHp2 === p }" @click="draftHp2 = p">{{ p }}</button>
								</div>
								<input type="number" class="hp-input ls-input" v-model.number="draftHp2" min="1"
									max="99" aria-label="Light Side base HP" />
							</div>
						</div>
						<!-- Theme selector -->
						<div class="theme-section">
							<div class="theme-label">ENVIRONMENT</div>
							<div class="theme-options">
								<button v-for="t in THEMES" :key="t.id" class="theme-btn"
									:class="['theme-btn--' + t.id, { active: draftTheme === t.id }]"
									@click="draftTheme = t.id">
									<span class="theme-icon">{{ t.icon }}</span>
									<span class="theme-name">{{ t.label }}</span>
								</button>
							</div>
						</div>
						<div class="config-actions">
							<button class="config-btn cancel-btn" @click="closeConfig">CANCEL</button>
							<button class="config-btn apply-btn" @click="applyConfig">ENGAGE</button>
						</div>
					</div>
				</div>
			</Transition>

			<!-- VICTORY OVERLAY -->
			<Transition name="victory">
				<div v-if="victor" class="victory-overlay" @click="reset">
					<div class="victory-content">
						<div class="victory-crawl">
							<div class="victory-faction-name" :class="victor === 'DARK SIDE' ? 'red' : 'blue'">
								{{ victor }}
							</div>
							<div class="victory-subtitle">DESTROYS THE BASE</div>
							<div class="victory-divider"></div>
							<div class="victory-cta">Tap anywhere to play again</div>
						</div>
					</div>
				</div>
			</Transition>
		</div>
	</div>

	<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
	<script>
		if ('serviceWorker' in navigator) {
			window.addEventListener('load', () => {
				navigator.serviceWorker.register('./sw.js').catch(() => { /* silently fails on file:// */ });
			});
		}
	</script>
	<script>
		const { createApp, ref, computed, onMounted, onUnmounted } = Vue;

		createApp({
			setup() {
				const PRESETS = [20, 25, 30, 35];
				const THEMES = [
					{ id: 'space', icon: '✦', label: 'SPACE' },
					{ id: 'tatooine', icon: '☀', label: 'TATOOINE' },
					{ id: 'hoth', icon: '❄', label: 'HOTH' },
					{ id: 'endor', icon: '🌿', label: 'ENDOR' },
				];

				const theme = ref('space');
				const draftTheme = ref('space');

				const startHp1 = ref(30);
				const startHp2 = ref(30);
				const p1hp = ref(0);
				const p2hp = ref(0);
				const p1Flash = ref(false);
				const p2Flash = ref(false);
				const victor = ref(null);

				// ── Timer ───────────────────────────────────────────────
				const timerSeconds = ref(0);
				const timerRunning = ref(false);
				let timerIntervalId = null;

				const timerFormatted = computed(() => {
					const h = Math.floor(timerSeconds.value / 3600);
					const m = Math.floor((timerSeconds.value % 3600) / 60);
					const s = timerSeconds.value % 60;
					return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
				});

				function toggleTimer() {
					if (timerRunning.value) {
						clearInterval(timerIntervalId);
						timerIntervalId = null;
						timerRunning.value = false;
					} else {
						timerIntervalId = setInterval(() => { timerSeconds.value++; }, 1000);
						timerRunning.value = true;
					}
				}

				// ── Config modal ──────────────────────────────────────
				const showConfig = ref(false);
				const draftHp1 = ref(startHp1.value);
				const draftHp2 = ref(startHp2.value);

				function openConfig() {
					draftHp1.value = startHp1.value;
					draftHp2.value = startHp2.value;
					draftTheme.value = theme.value;
					showConfig.value = true;
				}
				function closeConfig() {
					showConfig.value = false;
				}
				function applyConfig() {
					startHp1.value = Math.max(1, Math.min(99, draftHp1.value || 30));
					startHp2.value = Math.max(1, Math.min(99, draftHp2.value || 30));
					theme.value = draftTheme.value;
					showConfig.value = false;
					reset();
				}

				onMounted(() => {
					window.addEventListener('keydown', (e) => {
						if (e.key === 'Escape') closeConfig();
					});
				});

				onUnmounted(() => {
					if (timerIntervalId) clearInterval(timerIntervalId);
				});

				// ── Game logic ────────────────────────────────────────
				function change(player, delta) {
					if (victor.value) return;
					if (player === 1) {
						p1hp.value = Math.max(0, Math.min(startHp1.value, p1hp.value + delta));
						triggerFlash(1);
						if (p1hp.value >= startHp1.value) victor.value = 'LIGHT SIDE';
					} else {
						p2hp.value = Math.max(0, Math.min(startHp2.value, p2hp.value + delta));
						triggerFlash(2);
						if (p2hp.value >= startHp2.value) victor.value = 'DARK SIDE';
					}
				}

				function triggerFlash(player) {
					if (player === 1) {
						p1Flash.value = true;
						setTimeout(() => (p1Flash.value = false), 380);
					} else {
						p2Flash.value = true;
						setTimeout(() => (p2Flash.value = false), 380);
					}
				}

				function reset() {
					p1hp.value = 0;
					p2hp.value = 0;
					victor.value = null;
					timerSeconds.value = 0;
					if (timerIntervalId) { clearInterval(timerIntervalId); timerIntervalId = null; }
					timerRunning.value = false;
				}

				function stateClass(hp, max) {
					if (hp >= max) return 'defeated';
					if (max > 0 && hp / max >= 0.75) return 'critical';
					return '';
				}

				return {
					PRESETS, THEMES, startHp1, startHp2,
					p1hp, p2hp, p1Flash, p2Flash, victor,
					showConfig, draftHp1, draftHp2, draftTheme,
					openConfig, closeConfig, applyConfig,
					change, reset, stateClass,
					timerFormatted, timerRunning, toggleTimer,
					theme,
				};
			}
		}).mount('#app');
	</script>
</body>

</html>
